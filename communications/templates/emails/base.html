<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #111827;">
    <!-- Wrapper - dark gray background instead of blue -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: #111827;">
        <tr>
            <td style="padding: 28px 16px;">
                <!-- Container -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 520px; margin: 0 auto;">
                    <tr>
                        <td>
                            <!-- 3D Card -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: linear-gradient(165deg, rgba(55, 65, 81, 0.95) 0%, rgba(31, 41, 55, 0.98) 50%, rgba(17, 24, 39, 1) 100%); border-radius: 16px; border: 1px solid rgba(148, 163, 184, 0.15); box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.1);">

                                <!-- Header -->
                                <tr>
                                    <td style="padding: 24px 28px 20px;">
                                        <!-- Logo badge -->
                                        <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                                            <tr>
                                                <td style="background: linear-gradient(135deg, rgba(139, 92, 246, 0.25) 0%, rgba(236, 72, 153, 0.2) 100%); padding: 10px 18px; border-radius: 10px; border: 1px solid rgba(139, 92, 246, 0.3);">
                                                    <span style="font-size: 14px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.2px;">ForgeForth Africa</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>

                                <!-- Divider -->
                                <tr>
                                    <td style="padding: 0 28px;">
                                        <div style="height: 1px; background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.2), transparent);"></div>
                                    </td>
                                </tr>

                                <!-- Content -->
                                <tr>
                                    <td style="padding: 24px 28px 28px;">
                                        {% block content %}{% endblock %}
                                    </td>
                                </tr>

                                <!-- Footer -->
                                <tr>
                                    <td style="padding: 14px 28px 16px; background: rgba(0, 0, 0, 0.15); border-radius: 0 0 16px 16px;">
                                        <p style="margin: 0; font-size: 11px; color: #4b5563;">&copy; {% now "Y" %} ForgeForth Africa</p>
                                    </td>
                                </tr>

                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
