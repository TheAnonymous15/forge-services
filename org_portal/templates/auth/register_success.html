{% extends "base.html" %}

{% block guest_content %}
<div class="w-full max-w-md text-center">
    <div class="w-20 h-20 bg-green-600/20 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>

    <h1 class="text-2xl font-bold text-white mb-4">Registration Successful!</h1>
    <p class="text-gray-400 mb-6">
        We've sent a verification email to <strong class="text-white">{{ email }}</strong>.
        Please check your inbox and click the link to verify your account.
    </p>

    <a href="/auth/login" class="btn-primary inline-block">
        Go to Sign In
    </a>
</div>
{% endblock %}
