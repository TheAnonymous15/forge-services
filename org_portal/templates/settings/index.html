{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-white">Settings</h1>
        <p class="text-gray-400 mt-1">Manage your organization profile</p>
    </div>

    {% if request.query_params.get('updated') %}
    <div class="mb-6 p-4 bg-green-500/10 border border-green-500/30 rounded-lg">
        <p class="text-sm text-green-400">Settings updated successfully!</p>
    </div>
    {% endif %}

    {% if error %}
    <div class="mb-6 p-4 bg-red-500/10 border border-red-500/30 rounded-lg">
        <p class="text-sm text-red-400">{{ error }}</p>
    </div>
    {% endif %}

    <form method="post" class="space-y-6">
        <div class="card">
            <h2 class="text-lg font-semibold text-white mb-4">Organization Details</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Organization Name *</label>
                    <input type="text" name="name" value="{{ organization.name if organization else '' }}"
                           class="input-field" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Description</label>
                    <textarea name="description" rows="4" class="input-field"
                              placeholder="Tell candidates about your organization...">{{ organization.description if organization else '' }}</textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Industry *</label>
                        <select name="industry" class="input-field" required>
                            <option value="technology" {% if organization and organization.industry == 'technology' %}selected{% endif %}>Technology</option>
                            <option value="finance" {% if organization and organization.industry == 'finance' %}selected{% endif %}>Finance & Banking</option>
                            <option value="healthcare" {% if organization and organization.industry == 'healthcare' %}selected{% endif %}>Healthcare</option>
                            <option value="education" {% if organization and organization.industry == 'education' %}selected{% endif %}>Education</option>
                            <option value="retail" {% if organization and organization.industry == 'retail' %}selected{% endif %}>Retail</option>
                            <option value="manufacturing" {% if organization and organization.industry == 'manufacturing' %}selected{% endif %}>Manufacturing</option>
                            <option value="consulting" {% if organization and organization.industry == 'consulting' %}selected{% endif %}>Consulting</option>
                            <option value="nonprofit" {% if organization and organization.industry == 'nonprofit' %}selected{% endif %}>Non-Profit</option>
                            <option value="other" {% if organization and organization.industry == 'other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Company Size</label>
                        <select name="size" class="input-field">
                            <option value="">Select size</option>
                            <option value="1-10" {% if organization and organization.size == '1-10' %}selected{% endif %}>1-10 employees</option>
                            <option value="11-50" {% if organization and organization.size == '11-50' %}selected{% endif %}>11-50 employees</option>
                            <option value="51-200" {% if organization and organization.size == '51-200' %}selected{% endif %}>51-200 employees</option>
                            <option value="201-500" {% if organization and organization.size == '201-500' %}selected{% endif %}>201-500 employees</option>
                            <option value="501-1000" {% if organization and organization.size == '501-1000' %}selected{% endif %}>501-1000 employees</option>
                            <option value="1000+" {% if organization and organization.size == '1000+' %}selected{% endif %}>1000+ employees</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Website</label>
                        <input type="url" name="website" value="{{ organization.website if organization else '' }}"
                               class="input-field" placeholder="https://yourcompany.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Founded Year</label>
                        <input type="number" name="founded_year" value="{{ organization.founded_year if organization else '' }}"
                               class="input-field" min="1800" max="2030" placeholder="2020">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-end">
            <button type="submit" class="btn-primary">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
