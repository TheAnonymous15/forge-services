<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ForgeForth Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#0a0f1a]">
    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <img src="{% static 'website/images/one.jpg' %}" alt="" class="w-full h-full object-cover opacity-30">
        <div class="absolute inset-0 bg-gradient-to-b from-[#0a0f1a]/80 to-[#0a0f1a]"></div>
    </div>

    <div class="relative z-10 w-full max-w-sm mx-auto px-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <img src="{% static 'website/images/logo.png' %}" alt="ForgeForth Africa" class="h-20 w-auto mx-auto">
            </a>
        </div>

        <!-- Card - Glassmorphic 3D -->
        <div class="relative bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-7 shadow-[0_8px_32px_rgba(0,0,0,0.4)] transform hover:translate-y-[-2px] transition-transform duration-300">
            <!-- Subtle glow effect -->
            <div class="absolute -inset-0.5 bg-gradient-to-r from-purple-600/20 to-cyan-600/20 rounded-2xl blur opacity-30"></div>

            <div class="relative">
                {% if messages %}
                <div class="mb-4">
                    {% for message in messages %}
                    <div class="p-2.5 rounded-lg text-xs {% if message.tags == 'error' %}bg-red-900/30 text-red-400 border border-red-800/50{% else %}bg-green-900/30 text-green-400 border border-green-800/50{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <div id="errorMsg" class="hidden mb-4 p-2.5 rounded-lg text-xs bg-red-900/30 text-red-400 border border-red-800/50"></div>

                <form id="loginForm" method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="block text-gray-400 text-[10px] uppercase tracking-wide mb-1.5">Email</label>
                        <input type="email" name="email" required autocomplete="email"
                            class="w-full px-3 py-2.5 bg-white/5 border border-white/10 rounded-lg text-white text-sm placeholder-gray-500 focus:outline-none focus:border-purple-500/50 focus:bg-white/10 transition-all"
                            placeholder="you@example.com">
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-400 text-[10px] uppercase tracking-wide mb-1.5">Password</label>
                        <div class="relative">
                            <input type="password" id="password" name="password" required autocomplete="current-password"
                                class="w-full px-3 py-2.5 pr-10 bg-white/5 border border-white/10 rounded-lg text-white text-sm placeholder-gray-500 focus:outline-none focus:border-purple-500/50 focus:bg-white/10 transition-all"
                                placeholder="••••••••">
                            <button type="button" id="togglePwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                                <svg id="eyeOpen" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                                <svg id="eyeClosed" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mb-5">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="remember" name="remember" class="w-3.5 h-3.5 rounded bg-white/5 border-white/20 text-purple-500 focus:ring-0 focus:ring-offset-0">
                            <span class="text-gray-400 text-xs">Remember me</span>
                        </label>
                        <a href="#" class="text-gray-400 text-xs hover:text-white transition-colors">Reset password</a>
                    </div>

                    <!-- Two Buttons Row -->
                    <div class="flex gap-3">
                        <button type="submit" id="submitBtn"
                            class="flex-1 py-2.5 bg-white/10 hover:bg-white/15 backdrop-blur border border-white/20 text-white text-sm font-medium rounded-xl transition-all shadow-[0_4px_20px_rgba(255,255,255,0.1)] hover:shadow-[0_4px_25px_rgba(255,255,255,0.15)] hover:border-white/30 disabled:opacity-50 disabled:cursor-wait">
                            <span id="btnText">Login</span>
                            <span id="btnLoader" class="hidden">
                                <svg class="w-4 h-4 mx-auto animate-spin" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                </svg>
                            </span>
                        </button>
                        <button type="button" id="openRegister"
                            class="flex-1 py-2.5 bg-purple-600/20 hover:bg-purple-600/30 backdrop-blur border border-purple-500/30 text-purple-300 hover:text-white text-sm font-medium rounded-xl transition-all">
                            Register
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6">
            <a href="/" class="text-gray-600 text-[10px] hover:text-gray-400 transition-colors">
                ← forgeforthafrica.com
            </a>
        </div>
        <p class="text-center text-gray-700 text-[10px] mt-2">&copy; {% now "Y" %} ForgeForth Africa</p>
    </div>

    <script>
        // Toggle password visibility
        const pwd = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePwd');
        const eyeOpen = document.getElementById('eyeOpen');
        const eyeClosed = document.getElementById('eyeClosed');

        toggleBtn.addEventListener('click', () => {
            const isPassword = pwd.type === 'password';
            pwd.type = isPassword ? 'text' : 'password';
            eyeOpen.classList.toggle('hidden', isPassword);
            eyeClosed.classList.toggle('hidden', !isPassword);
        });

        // Remember me
        const rememberCb = document.getElementById('remember');
        const emailInput = document.querySelector('input[name="email"]');
        const savedEmail = localStorage.getItem('ff_portal_email');
        if (savedEmail) {
            emailInput.value = savedEmail;
            rememberCb.checked = true;
        }

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            if (rememberCb.checked) {
                localStorage.setItem('ff_portal_email', emailInput.value);
            } else {
                localStorage.removeItem('ff_portal_email');
            }
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
        });

        // Open registration
        document.getElementById('openRegister')?.addEventListener('click', () => {
            openRegistrationModal('partner');
        });
    </script>

    <!-- Include Registration Modal -->
    {% include 'components/registration_modal.html' %}
</body>
</html>
