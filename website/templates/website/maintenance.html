<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - ForgeForth Africa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F4C81',
                        'forgeforth-blue-light': '#1E88E5',
                        secondary: '#F7A600',
                        'forgeforth-orange': '#FF6B35',
                        accent: '#4CAF50',
                    },
                    fontFamily: {
                        display: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 8s linear infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- Maintenance Mode Content -->
    <div class="max-w-2xl mx-auto text-center">
        <!-- Logo/Brand -->
        <div class="mb-12">
            <div class="inline-flex items-center space-x-3 bg-slate-800/50 backdrop-blur-xl px-5 py-2.5 rounded-xl border border-slate-700/50">
                <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-lg">FF</span>
                </div>
                <span class="font-bold text-lg text-white">ForgeForth <span class="text-blue-400">Africa</span></span>
            </div>
        </div>

        <!-- Animated Icon -->
        <div class="mb-10">
            <div class="inline-block relative">
                <div class="absolute inset-0 bg-blue-500/20 blur-2xl rounded-full animate-pulse-slow"></div>
                <div class="relative bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 border border-slate-700/50">
                    <svg class="w-16 h-16 text-blue-400 animate-spin-slow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Main Message -->
        <div class="mb-10">
            <h1 class="font-bold text-3xl md:text-4xl text-white mb-3">
                We're Upgrading
            </h1>
            <p class="text-base text-slate-400 max-w-md mx-auto leading-relaxed">
                Our platform is currently undergoing scheduled maintenance. We'll be back online shortly.
            </p>
        </div>

        <!-- Status & Real-time Indicator -->
        <div class="mb-10">
            <div class="inline-flex items-center gap-3 bg-slate-800/50 backdrop-blur-md rounded-xl px-5 py-3 border border-slate-700/50">
                <div class="flex space-x-1.5">
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-pulse"></div>
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-pulse" style="animation-delay: 0.2s"></div>
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-pulse" style="animation-delay: 0.4s"></div>
                </div>
                <span class="text-sm text-slate-300 font-medium" id="status-text">Checking status...</span>
            </div>
        </div>

        <!-- Quick Info -->
        <div class="mb-8">
            <div class="bg-slate-800/30 backdrop-blur-md rounded-xl p-6 border border-slate-700/50">
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div class="text-center">
                        <div class="text-slate-400 mb-1">Estimated Time</div>
                        <div class="text-white font-semibold">~30 minutes</div>
                    </div>
                    <div class="text-center">
                        <div class="text-slate-400 mb-1">Last Check</div>
                        <div class="text-white font-semibold" id="last-check">Just now</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact -->
        <div class="text-center">
            <p class="text-sm text-slate-400 mb-4">
                Questions? Email us at
                <a href="mailto:hello@forgeforth.africa" class="text-blue-400 hover:text-blue-300 font-medium">
                    hello@forgeforth.africa
                </a>
            </p>

            <!-- Social Links -->
            <div class="flex justify-center gap-3">
                <a href="#" class="w-9 h-9 bg-slate-800/50 hover:bg-slate-700/50 rounded-lg flex items-center justify-center transition-all border border-slate-700/50">
                    <svg class="w-4 h-4 text-slate-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/>
                    </svg>
                </a>
                <a href="#" class="w-9 h-9 bg-slate-800/50 hover:bg-slate-700/50 rounded-lg flex items-center justify-center transition-all border border-slate-700/50">
                    <svg class="w-4 h-4 text-slate-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/>
                    </svg>
                </a>
                <a href="#" class="w-9 h-9 bg-slate-800/50 hover:bg-slate-700/50 rounded-lg flex items-center justify-center transition-all border border-slate-700/50">
                    <svg class="w-4 h-4 text-slate-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <!-- Real-time Maintenance Mode Checker (Silent - No DOM Updates) -->
    <script>
        let isRedirecting = false;

        function checkMaintenanceStatus() {
            if (isRedirecting) return;

            // Completely silent check in background - NO DOM updates at all
            fetch('/health', {
                method: 'GET',
                cache: 'no-cache',
                headers: {
                    'Cache-Control': 'no-cache'
                }
            })
            .then(response => {
                if (response.ok && response.status === 200) {
                    return response.json();
                }
                throw new Error('Still in maintenance');
            })
            .then(data => {
                // If we get a successful response, site is back online
                if (data && data.status === 'healthy') {
                    isRedirecting = true;
                    // Smooth fade out before redirect
                    document.body.style.transition = 'opacity 0.5s ease-out';
                    document.body.style.opacity = '0';

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                }
            })
            .catch(() => {
                // Still in maintenance mode - do nothing (completely silent)
            });
        }

        // Check immediately on page load
        checkMaintenanceStatus();

        // Check every 3 seconds (real-time monitoring without any visual updates)
        setInterval(checkMaintenanceStatus, 3000);
    </script>
</body>
</html>
