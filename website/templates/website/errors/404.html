{% extends "layouts/base.html" %}

{% block content %}
<section class="min-h-screen flex items-center justify-center px-6 lg:px-8">
    <div class="text-center" data-aos="fade-up">
        <!-- 404 Visual -->
        <div class="relative mb-8">
            <h1 class="text-[150px] md:text-[200px] font-bold text-slate-800/50 leading-none">404</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-purple-500/20 to-cyan-500/20 flex items-center justify-center">
                    <svg class="w-12 h-12 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
            </div>
        </div>

        <h2 class="text-2xl md:text-3xl font-bold text-white mb-4">
            Page Not Found
        </h2>
        <p class="text-slate-400 mb-8 max-w-md mx-auto">
            Oops! The page you're looking for doesn't exist or has been moved.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="/" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-to-r from-purple-600 to-cyan-600 text-white font-medium hover:shadow-lg hover:shadow-purple-500/25 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Go Home
            </a>
            <a href="/contact" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl glass text-slate-300 hover:text-white transition-all">
                Contact Support
            </a>
        </div>
    </div>
</section>
{% endblock %}
