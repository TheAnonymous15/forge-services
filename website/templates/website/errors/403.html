<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Forbidden | ForgeForth Africa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#060b14] min-h-screen flex items-center justify-center">

    <div class="text-center px-4 py-16 max-w-2xl mx-auto">

        <!-- Large 403 -->
        <div class="relative mb-8">
            <h1 class="font-black text-[140px] md:text-[200px] leading-none bg-gradient-to-b from-amber-700/50 to-transparent bg-clip-text text-transparent select-none">
                403
            </h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="text-6xl md:text-7xl">🔒</span>
            </div>
        </div>

        <!-- Message -->
        <div class="mb-10">
            <h2 class="font-bold text-2xl md:text-3xl text-white mb-3">
                Access Forbidden
            </h2>
            <p class="text-slate-400 text-base md:text-lg max-w-md mx-auto">
                You don't have permission to access this page. If you think this is a mistake, please contact our support team.
            </p>
        </div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center mb-10">
            <a href="/"
               class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl
                      bg-gradient-to-r from-indigo-500 to-purple-600
                      text-white text-sm font-semibold
                      hover:shadow-lg hover:shadow-indigo-500/25 hover:-translate-y-0.5
                      transition-all duration-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Back to Home
            </a>
            <button onclick="history.back()"
                    class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl
                           bg-white/[0.06] border border-white/[0.1]
                           text-slate-300 text-sm font-medium
                           hover:bg-white/[0.1] hover:text-white
                           transition-all duration-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Go Back
            </button>
        </div>

        <!-- Footer -->
        <p class="text-slate-600 text-xs">
            Need help? <a href="/contact" class="text-indigo-400 hover:text-indigo-300 transition-colors">Contact us</a>
        </p>
    </div>

    <!-- Subtle background elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
        <div class="absolute top-1/4 -right-32 w-96 h-96 bg-amber-500/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 -left-32 w-96 h-96 bg-yellow-500/5 rounded-full blur-3xl"></div>
    </div>

</body>
</html>
