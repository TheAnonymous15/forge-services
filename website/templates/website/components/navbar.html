<!-- Nav Tooltip Styles -->
<style>
    .nav-tooltip {
        position: absolute;
        left: 100%;
        top: 50%;
        transform: translateY(-50%);
        margin-left: 12px;
        padding: 6px 12px;
        background: rgba(12, 12, 18, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        font-size: 12px;
        font-weight: 500;
        color: white;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s ease;
        pointer-events: none;
        z-index: 100;
    }
    .nav-tooltip::before {
        content: '';
        position: absolute;
        right: 100%;
        top: 50%;
        transform: translateY(-50%);
        border: 6px solid transparent;
        border-right-color: rgba(12, 12, 18, 0.95);
    }
    .nav-item:hover .nav-tooltip {
        opacity: 1;
        visibility: visible;
    }
    .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom);
    }
</style>
