<!-- Language Switcher Component -->
<!-- Include this in your navbar or header -->

<div class="language-switcher relative" x-data="{ open: false }">
    <!-- Current Language Button -->
    <button
        @click="open = !open"
        @click.outside="open = false"
        class="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 backdrop-blur-sm border border-white/10 hover:bg-white/10 transition-all duration-300"
        aria-label="Select language"
    >
        <span class="text-lg">{{ request.LANGUAGE_INFO.flag if request.LANGUAGE_INFO else '🌍' }}</span>
        <span class="text-sm text-white/80 hidden sm:inline">
            {{ request.LANGUAGE_INFO.native_name if request.LANGUAGE_INFO else 'English' }}
        </span>
        <svg class="w-4 h-4 text-white/60 transition-transform" :class="{ 'rotate-180': open }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>

    <!-- Language Dropdown -->
    <div
        x-show="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 scale-100"
        x-transition:leave-end="opacity-0 scale-95"
        class="absolute right-0 mt-2 w-64 max-h-96 overflow-y-auto rounded-2xl bg-gray-900/95 backdrop-blur-xl border border-white/10 shadow-2xl z-50"
        style="display: none;"
    >
        <div class="p-2">
            <!-- Search (optional) -->
            <div class="px-3 py-2 mb-2">
                <input
                    type="text"
                    placeholder="Search languages..."
                    class="w-full px-3 py-2 text-sm bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/40 focus:outline-none focus:border-blue-500/50"
                    x-model="searchQuery"
                    @input="filterLanguages"
                >
            </div>

            <!-- Language List -->
            <div class="space-y-1">
                {% for lang in available_languages %}
                <a
                    href="?lang={{ lang.code }}"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/10 transition-all duration-200 group {% if request.LANGUAGE_CODE == lang.code %}bg-blue-500/20 border border-blue-500/30{% endif %}"
                    data-lang="{{ lang.code }}"
                    data-name="{{ lang.name }}"
                    data-native="{{ lang.native_name }}"
                >
                    <span class="text-xl">{{ lang.flag }}</span>
                    <div class="flex-1">
                        <div class="text-sm font-medium text-white group-hover:text-blue-400 transition-colors">
                            {{ lang.native_name }}
                        </div>
                        <div class="text-xs text-white/50">
                            {{ lang.name }} {% if lang.region %}· {{ lang.region }}{% endif %}
                        </div>
                    </div>
                    {% if request.LANGUAGE_CODE == lang.code %}
                    <svg class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                    {% endif %}
                </a>
                {% endfor %}
            </div>

            <!-- Powered by note -->
            <div class="px-3 py-2 mt-2 border-t border-white/10">
                <p class="text-xs text-white/30 text-center">
                    Powered by AI Translation
                </p>
            </div>
        </div>
    </div>
</div>

<style>
/* RTL Support */
[dir="rtl"] .language-switcher {
    left: 0;
    right: auto;
}

/* Language dropdown scrollbar */
.language-switcher .overflow-y-auto::-webkit-scrollbar {
    width: 6px;
}
.language-switcher .overflow-y-auto::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
}
.language-switcher .overflow-y-auto::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
}
.language-switcher .overflow-y-auto::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.3);
}
</style>
