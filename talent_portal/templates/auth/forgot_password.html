{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block body %}
<div class="min-h-screen gradient-bg flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Card -->
        <div class="card">
            <!-- Header -->
            <div class="text-center mb-8">
                <a href="{{ main_site_url }}" class="inline-flex items-center space-x-2 mb-6">
                    <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">FF</span>
                    </div>
                    <span class="text-xl font-semibold text-white">ForgeForth</span>
                </a>
                <h1 class="text-2xl font-bold text-white">Reset Your Password</h1>
                <p class="text-gray-400 mt-2">Enter your email and we'll send you a reset link</p>
            </div>

            {% if error %}
            <div class="mb-6 p-4 bg-red-500/10 border border-red-500/30 rounded-lg">
                <p class="text-sm text-red-400">{{ error }}</p>
            </div>
            {% endif %}

            <!-- Form -->
            <form method="post" action="/auth/forgot-password">
                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-2">
                        Email Address
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="input-field"
                        placeholder="you@example.com"
                        required
                        autofocus
                    >
                </div>

                <button type="submit" class="btn-primary w-full">
                    Send Reset Link
                </button>
            </form>

            <!-- Back to Login -->
            <div class="mt-6 text-center">
                <a href="/auth/login" class="text-sm text-primary-400 hover:underline">
                    ← Back to Sign In
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
