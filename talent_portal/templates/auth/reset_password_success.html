{% extends "base.html" %}

{% block title %}Password Reset Successful{% endblock %}

{% block body %}
<div class="min-h-screen gradient-bg flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="card text-center">
            <!-- Success Icon -->
            <div class="mx-auto w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h1 class="text-2xl font-bold text-white mb-2">Password Reset!</h1>
            <p class="text-gray-400 mb-6">
                Your password has been successfully reset. You can now sign in with your new password.
            </p>

            <a href="/auth/login" class="btn-primary inline-block w-full">
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
