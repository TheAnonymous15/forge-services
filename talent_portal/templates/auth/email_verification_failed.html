{% extends "base.html" %}

{% block title %}Verification Failed{% endblock %}

{% block body %}
<div class="min-h-screen gradient-bg flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="card text-center">
            <!-- Error Icon -->
            <div class="mx-auto w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>

            <h1 class="text-2xl font-bold text-white mb-2">Verification Failed</h1>
            <p class="text-gray-400 mb-6">
                {{ error or "The verification link is invalid or has expired." }}
            </p>

            <div class="space-y-3">
                <a href="/auth/resend-verification" class="btn-primary inline-block w-full">
                    Request New Link
                </a>
                <a href="/auth/login" class="btn-secondary inline-block w-full">
                    Sign In
                </a>
            </div>

            <div class="mt-4">
                <a href="{{ main_site_url }}" class="text-sm text-gray-400 hover:text-primary-400">
                    ← Back to ForgeForth Africa
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
