{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block body %}
<div class="min-h-screen gradient-bg flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="card">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="mx-auto w-14 h-14 bg-primary-600/20 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-7 h-7 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white">Create New Password</h1>
                <p class="text-gray-400 mt-2">Enter your new password below</p>
            </div>

            {% if error %}
            <div class="mb-6 p-4 bg-red-500/10 border border-red-500/30 rounded-lg">
                <p class="text-sm text-red-400">{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" action="/auth/reset-password/{{ token }}">
                <div class="space-y-4">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                            New Password
                        </label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="input-field"
                            placeholder="••••••••"
                            minlength="8"
                            required
                            autofocus
                        >
                    </div>

                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-gray-300 mb-2">
                            Confirm Password
                        </label>
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            class="input-field"
                            placeholder="••••••••"
                            minlength="8"
                            required
                        >
                    </div>
                </div>

                <div class="mt-4 text-sm text-gray-400">
                    <p>Password must be at least 8 characters</p>
                </div>

                <button type="submit" class="btn-primary w-full mt-6">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
